# This is a basic workflow to help you get started with Actions

name: cart

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # Runs a set of commands using the runners shell
      - name: Run npm test
        run: echo npm test
  docker:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: ecr login
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/u4j6q5s8
      - name: build docker image
        run: docker build -t public.ecr.aws/u4j6q5s8/user:v1 .
      - name: push to aws ecr
        run: docker push public.ecr.aws/u4j6q5s8/user:v1

  dev:
    needs: docker
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
        repository: pdevops87/roboshop-helm-v1
      - name: connect to kubernetes api through kubeconfig
        run: echo aws eks update-kubeconfig --name dev
      - name: deploy chart using helm
        run: echo helm upgrade -i dev . -f pass-to-templates/user.yaml






          
